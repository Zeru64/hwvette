<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zeru's Corvettes</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap');
        :root { font-family: 'Inter', system_ui, sans-serif; }
        .modal { animation: modalPop 0.3s ease forwards; }
        @keyframes modalPop { 0% { opacity: 0; transform: scale(0.95); } 100% { opacity: 1; transform: scale(1); } }
        .grid-item, .model-card { transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1); }
        .grid-item:hover, .model-card:hover { transform: translateY(-6px); box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1); }
    </style>
</head>
<body class="bg-zinc-950 text-zinc-100">

    <nav class="bg-red-600 border-b border-red-700 sticky top-0 z-50">
        <div class="max-w-screen-2xl mx-auto px-6 py-4 flex items-center justify-between">
            <div class="flex items-center gap-x-3">
                <div class="w-9 h-9 bg-white rounded-2xl flex items-center justify-center text-red-600 text-3xl shadow-inner">HW</div>
                <div>
                    <h1 class="text-2xl font-semibold tracking-tight">Hot Wheels Corvette</h1>
                    <p class="text-red-200 text-xs -mt-0.5">Zeru's Corvette Collection</p>
                </div>
            </div>

            <div class="flex bg-red-700 rounded-3xl p-1 shadow-inner">
                <button onclick="setPage('coleccion')" id="tab-coleccion" class="nav-tab px-8 py-3 rounded-3xl text-sm font-medium">Coleccion</button>
                <button onclick="setPage('faltantes')" id="tab-faltantes" class="nav-tab px-8 py-3 rounded-3xl text-sm font-medium">Faltantes</button>
                <button onclick="setPage('informacion')" id="tab-informacion" class="nav-tab px-8 py-3 rounded-3xl text-sm font-medium">Informacion</button>
            </div>

            <div class="text-xs bg-red-700 text-red-100 px-3 py-1.5 rounded-2xl flex items-center">
                <span id="total-count" class="font-mono font-semibold">0</span>
                <span class="ml-1 opacity-70">coches</span>
            </div>
        </div>
    </nav>

    <div id="main-content" class="max-w-screen-2xl mx-auto px-6 py-8"></div>

    <!-- Modal Detalle -->
    <div id="detail-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
        <div class="bg-white text-zinc-900 rounded-3xl max-w-2xl w-full max-h-[92vh] overflow-hidden modal">
            <div class="p-8" id="detail-content"></div>
        </div>
    </div>

    <!-- Modal Editar / Añadir -->
    <div id="form-modal" class="hidden fixed inset-0 bg-black/80 flex items-center justify-center z-[100] p-4">
        <div class="bg-white text-zinc-900 rounded-3xl max-w-xl w-full modal">
            <div class="p-8">
                <h2 id="form-title" class="text-2xl font-semibold mb-6">Añadir nuevo Hot Wheel</h2>
                <div class="grid grid-cols-2 gap-x-6 gap-y-5" id="item-form"></div>
                <div class="flex justify-end gap-x-4 mt-8">
                    <button onclick="closeAllModals()" class="px-6 py-3 border border-zinc-300 rounded-2xl hover:bg-zinc-100">Cancelar</button>
                    <button onclick="saveItem()" id="save-button" class="px-8 py-3 bg-emerald-600 text-white rounded-2xl hover:bg-emerald-700 font-semibold">Guardar</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        let database = [];
        let currentPage = 'coleccion';
        let currentModel = null;
        let editingId = null;

        const DB_URL = "https://raw.githubusercontent.com/tuusuario/turepositorio/main/database.json";   // ← CAMBIA ESTA URL

        const pageConfig = {
            coleccion: { label: 'Coleccion', cat: 'Coleccion' },
            faltantes: { label: 'Faltantes', cat: 'Faltantes' },
            informacion: { label: 'Informacion' }
        };

        const allFields = = [
            { key: 'id', label: 'ID' },
            { key: 'model', label: 'Modelo' },
            { key: 'name', label: 'Nombre' },
            { key: 'year', label: 'Lanzamiento' },
            { key: 'color', label: 'Color' },
            { key: 'serie1', label: 'Serie 1' },
            { key: 'serie2', label: 'Serie 2' },
            { key: 'subserie', label: 'Subserie' },
            { key: 'variant', label: 'Variante' },
            { key: 'notes', label: 'Notas' },
            { key: 'collection', label: 'Categoria' },
            { key: 'imgurl', label: 'URL Imagen' }
        ];

        async function loadDatabase() {
            try {
                const response = await fetch(https://raw.githubusercontent.com/Zeru64/hwvette/refs/heads/main/corvette-master.json);
                if (!response.ok) throw new Error("No se pudo cargar");
                database = await response.json();
                database.forEach(item => { if (!item.model) item.model = ''; });
                console.log(`✅ Base de datos cargada correctamente (${database.length} entradas)`);
                renderContent();
            } catch (error) {
                console.error("Error cargando base de datos:", error);
                alert("No se pudo cargar la base de datos desde GitHub. Usando datos locales.");
                loadFromLocalStorage();
                renderContent();
            }
        }

        function loadFromLocalStorage() {
            const saved = localStorage.getItem('hotwheelsDB');
            if (saved) database = JSON.parse(saved);
        }

        function saveToLocalStorage() {
            localStorage.setItem('hotwheelsDB', JSON.stringify(database));
        }

        function renderNav() {
            document.getElementById('total-count').textContent = database.length;
            ['coleccion','faltantes','informacion'].forEach(tab => {
                const el = document.getElementById(`tab-${tab}`);
                if (el) el.classList.toggle('bg-white', 'text-red-600', tab === currentPage);
            });
        }

        function getModelsInCategory(cat) {
            const items = database.filter(i => i.collection === cat);
            const models = {};
            items.forEach(item => {
                const m = item.model || 'Sin modelo';
                if (!models[m]) models[m] = [];
                models[m].push(item);
            });
            return models;
        }

        function renderContent() {
            const container = document.getElementById('main-content');
            let html = '';

            if (currentPage === 'informacion') {
                const coleccionCount = database.filter(i => i.collection === 'Coleccion').length;
                const faltantesCount = database.filter(i => i.collection === 'Faltantes').length;

                html = `
                <div class="max-w-4xl mx-auto">
                    <div class="bg-white text-zinc-900 rounded-3xl p-8">
                        <h1 class="text-4xl font-semibold mb-2">Informacion general</h1>
                        <p class="text-zinc-500 mb-8">Resumen de tu registro - ${database.length} coches totales</p>
                        <div class="grid grid-cols-3 gap-6">
                            <div class="bg-zinc-50 border border-zinc-100 rounded-3xl p-6">
                                <p class="text-emerald-600 text-sm font-medium">COLECCION</p>
                                <p class="text-7xl font-semibold text-emerald-600 mt-2">${coleccionCount}</p>
                            </div>
                            <div class="bg-zinc-50 border border-zinc-100 rounded-3xl p-6">
                                <p class="text-amber-600 text-sm font-medium">FALTANTES</p>
                                <p class="text-7xl font-semibold text-amber-600 mt-2">${faltantesCount}</p>
                            </div>
                            <div class="bg-zinc-50 border border-zinc-100 rounded-3xl p-6">
                                <p class="text-red-600 text-sm font-medium">TOTAL</p>
                                <p class="text-7xl font-semibold text-red-600 mt-2">${database.length}</p>
                            </div>
                        </div>

                        <div class="mt-12 border-t border-zinc-100 pt-8">
                            <h3 class="font-semibold text-lg mb-6">Importar / Exportar</h3>
                            <div class="flex flex-col md:flex-row gap-6">
                                <div onclick="document.getElementById('import-input').click()" class="flex-1 cursor-pointer border-2 border-dashed border-zinc-300 hover:border-red-300 rounded-3xl p-8 text-center">
                                    <p class="font-medium">Importar JSON</p>
                                    <input type="file" id="import-input" accept=".json" class="hidden" onchange="handleImport(event)">
                                </div>
                                <div onclick="exportJSON()" class="flex-1 cursor-pointer border-2 border-dashed border-zinc-300 hover:border-red-300 rounded-3xl p-8 text-center">
                                    <p class="font-medium">Exportar JSON</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;
            } else if (currentModel) {
                // Vista de variantes del modelo
                const items = database.filter(i => i.collection === pageConfig[currentPage].cat && (i.model || 'Sin modelo') === currentModel);
                html = `
                <div class="mb-6 flex items-center justify-between">
                    <div class="flex items-center gap-4">
                        <button onclick="backToModels()" class="px-6 py-3 bg-zinc-800 hover:bg-zinc-700 rounded-3xl">Volver a Modelos</button>
                        <h1 class="text-3xl font-semibold">${currentModel}</h1>
                    </div>
                    <button onclick="addNewItem()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-3xl text-sm font-medium">
                        <span class="text-2xl">+</span> Agregar nuevo
                    </button>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
                    ${items.map((item, idx) => `
                        <div onclick="showDetailModalByIndex(${database.indexOf(item)})" class="grid-item bg-white rounded-3xl overflow-hidden cursor-pointer">
                            <img src="${item.imgurl || 'https://picsum.photos/id/1015/600/400'}" class="w-full aspect-video object-cover" onerror="this.src='https://picsum.photos/id/1015/600/400'">
                            <div class="p-4">
                                <p class="font-medium">${item.name}</p>
                                <p class="text-zinc-500">${item.color || ''}</p>
                            </div>
                        </div>
                    `).join('')}
                </div>`;
            } else {
                // Vista de Modelos (carpetas)
                const models = getModelsInCategory(pageConfig[currentPage].cat);
                html = `
                <div class="flex justify-between items-center mb-8">
                    <h1 class="text-3xl font-semibold">${pageConfig[currentPage].label}</h1>
                    <button onclick="addNewItem()" class="flex items-center gap-x-2 bg-emerald-600 hover:bg-emerald-700 px-6 py-3 rounded-3xl text-sm font-medium">
                        <span class="text-2xl">+</span> Añadir nuevo
                    </button>
                </div>
                <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-6">
                    ${Object.keys(models).sort().map(m => {
                        const first = models[m][0];
                        return `
                        <div onclick="selectModel('${m.replace(/'/g, "\\'")}')" class="model-card bg-white rounded-3xl overflow-hidden cursor-pointer">
                            <img src="${first.imgurl || 'https://picsum.photos/id/1015/600/400'}" class="w-full h-48 object-cover" onerror="this.src='https://picsum.photos/id/1015/600/400'">
                            <div class="p-5">
                                <p class="font-semibold text-xl">${m}</p>
                                <p class="text-zinc-500">${models[m].length} versiones</p>
                            </div>
                        </div>`;
                    }).join('')}
                </div>`;
            }

            container.innerHTML = html;
            renderNav();
        }

        function selectModel(model) { currentModel = model; renderContent(); }
        function backToModels() { currentModel = null; renderContent(); }
        function setPage(page) { currentPage = page; currentModel = null; renderContent(); }

        function showDetailModalByIndex(globalIndex) {
            const item = database[globalIndex];
            if (!item) return;

            let html = `
            <div class="flex justify-between items-start mb-6">
                <div>
                    <h2 class="text-3xl font-semibold">${item.name || 'Sin nombre'}</h2>
                    ${item.year ? `<p class="text-red-600 text-2xl">${item.year}</p>` : ''}
                </div>
                <button onclick="closeAllModals()" class="text-4xl text-zinc-400 hover:text-zinc-600">X</button>
            </div>
            <div class="flex justify-center mb-8">
                <img src="${item.imgurl || 'https://picsum.photos/id/1015/600/400'}" 
                     class="max-h-80 rounded-3xl shadow-xl object-contain"
                     onerror="this.src='https://picsum.photos/id/1015/600/400'">
            </div>`;

            html += `<div class="grid grid-cols-2 gap-y-6 text-sm">`;
            allFields.forEach(f => {
                if (item[f.key] !== undefined && item[f.key] !== '') {
                    html += `<div class="flex justify-between border-b pb-3"><span class="text-zinc-500">${f.label}</span><span>${item[f.key]}</span></div>`;
                }
            });
            html += `</div>`;

            html += `
            <div class="flex gap-4 mt-10">
                <button onclick="startEditByIndex(${globalIndex})" class="flex-1 py-4 bg-amber-500 text-white rounded-3xl">Editar</button>
                <button onclick="deleteItemByIndex(${globalIndex});closeAllModals()" class="flex-1 py-4 bg-red-500 text-white rounded-3xl">Eliminar</button>
                <button onclick="closeAllModals()" class="flex-1 py-4 bg-zinc-200 text-zinc-700 rounded-3xl">Cerrar</button>
            </div>`;

            document.getElementById('detail-content').innerHTML = html;
            document.getElementById('detail-modal').classList.remove('hidden');
        }

        function startEditByIndex(index) {
            closeAllModals();
            setTimeout(() => editItemByIndex(index), 300);
        }

        function editItemByIndex(index) {
            editingId = index;
            document.getElementById('form-title').textContent = 'Editar Hot Wheel';
            buildForm(index);
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function addNewItem() {
            editingId = null;
            document.getElementById('form-title').textContent = 'Añadir nuevo Hot Wheel';
            buildForm();
            document.getElementById('form-modal').classList.remove('hidden');
        }

        function buildForm(index = null) {
            const item = index !== null ? database[index] : {};
            let html = '';
            allFields.forEach(field => {
                const val = item[field.key] || '';
                if (field.key === 'collection') {
                    html += `<div class="col-span-2"><label class="block text-xs font-medium text-zinc-500 mb-1">${field.label}</label>
                    <select id="form-${field.key}" class="w-full border border-zinc-200 rounded-3xl px-5 py-4">
                        <option value="Coleccion" ${val==='Coleccion'?'selected':''}>Coleccion</option>
                        <option value="Faltantes" ${val==='Faltantes'?'selected':''}>Faltantes</option>
                    </select></div>`;
                } else if (field.key === 'notes') {
                    html += `<div class="col-span-2"><label class="block text-xs font-medium text-zinc-500 mb-1">${field.label}</label>
                    <textarea id="form-${field.key}" rows="3" class="w-full border border-zinc-200 rounded-3xl px-5 py-4">${val}</textarea></div>`;
                } else {
                    html += `<div><label class="block text-xs font-medium text-zinc-500 mb-1">${field.label}</label>
                    <input type="text" id="form-${field.key}" value="${val}" class="w-full border border-zinc-200 rounded-3xl px-5 py-4"></div>`;
                }
            });
            document.getElementById('item-form').innerHTML = html;
        }

        function saveItem() {
            const newItem = {};
            allFields.forEach(f => {
                const el = document.getElementById(`form-${f.key}`);
                if (el) newItem[f.key] = el.value.trim();
            });

            if (!newItem.id || !newItem.name) {
                alert("ID y Nombre son obligatorios");
                return;
            }

            if (editingId !== null) {
                database[editingId] = { ...database[editingId], ...newItem };
            } else {
                database.push(newItem);
            }

            saveToLocalStorage();
            closeAllModals();
            renderContent();
        }

        function deleteItemByIndex(index) {
            if (confirm("Eliminar este coche?")) {
                database.splice(index, 1);
                saveToLocalStorage();
                renderContent();
            }
        }

        function closeAllModals() {
            document.getElementById('detail-modal').classList.add('hidden');
            document.getElementById('form-modal').classList.add('hidden');
        }

        function exportJSON() {
            const str = JSON.stringify(database, null, 2);
            const blob = new Blob([str], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = 'corvette-collection.json'; a.click();
        }

        function handleImport(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = ev => {
                database = JSON.parse(ev.target.result);
                saveToLocalStorage();
                currentModel = null;
                renderContent();
                alert('JSON importado correctamente');
            };
            reader.readAsText(file);
        }

        function initialize() {
            loadDatabase();
        }

        window.onload = initialize;
    </script>
</body>
</html>
